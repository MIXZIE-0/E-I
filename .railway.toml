[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.buildArgs]
OPENCLAW_EXTENSIONS = "discord,telegram,groq"

[deploy]
numReplicas = 1
startCommand = "sh -c 'OPENCLAW_CONFIG_PATH=/app/.railway/config.json OPENCLAW_GATEWAY_PORT=${PORT:-18789} node openclaw.mjs gateway'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
