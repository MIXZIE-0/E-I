[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.buildArgs]
OPENCLAW_EXTENSIONS = "discord,telegram,groq"

[deploy]
numReplicas = 1
startCommand = "sh -c 'OPENCLAW_CONFIG_PATH=/app/.railway/config.json node openclaw.mjs gateway --bind 0.0.0.0 --port ${PORT:-18789} --allow-unconfigured'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
